spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate   # mantém como 'validate' ele so vai validar a tabela, Se tiver uma coluna faltando vai dar Erro mas não vai consertar
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl # Mantem o NOME IDENTICO ao oq eu coloquei nas Columns
    show-sql: true
  flyway:
    enabled: true       # garante que o Flyway rode as migrations
    baseline-on-migrate: true  # se o banco já tem dados
server:
  address: 0.0.0.0
  port: 8080